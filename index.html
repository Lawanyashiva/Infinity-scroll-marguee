<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects Marquee</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="projects-section">
        <div class="section-heading">
          <p class="eyebrow">Featured Work</p>
          <h1>Infinite scrolling projects marquee</h1>
          <p class="description">Hover any card to reveal the title and gently slow the animation for a premium interactive feel.</p>
        </div>

        <div class="marquee-wrapper" aria-label="Projects marquee">
          <div class="marquee-track" id="marqueeTrack">
            <article class="project-card" data-title="Aurora App">
              <div class="image-mask">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Aurora App project" />
              </div>
              <div class="card-overlay"><span>Aurora App</span></div>
            </article>
            <article class="project-card" data-title="Pulse Studio">
              <div class="image-mask">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" alt="Pulse Studio project" />
              </div>
              <div class="card-overlay"><span>Pulse Studio</span></div>
            </article>
            <article class="project-card" data-title="Lumen Dashboard">
              <div class="image-mask">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" alt="Lumen Dashboard project" />
              </div>
              <div class="card-overlay"><span>Lumen Dashboard</span></div>
            </article>
            <article class="project-card" data-title="Nimbus Brand">
              <div class="image-mask">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=800&q=80" alt="Nimbus Brand project" />
              </div>
              <div class="card-overlay"><span>Nimbus Brand</span></div>
            </article>
            <article class="project-card" data-title="Helio Commerce">
              <div class="image-mask">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80" alt="Helio Commerce project" />
              </div>
              <div class="card-overlay"><span>Helio Commerce</span></div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
